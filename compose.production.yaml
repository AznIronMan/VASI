name: vasi

services:
  settings:
    build:
      context: .
      target: migrator
    image: vasi-settings:0.44.0
    volumes:
      - ./data:/app/data
    entrypoint: ["node", "scripts/settings.mjs"]
    command: ["list"]
    user: "0:0"
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
    security_opt:
      - no-new-privileges:true
    profiles:
      - tools

  migrate:
    build:
      context: .
      target: migrator
    image: vasi-settings:0.44.0
    volumes:
      - ./data:/app/data:ro
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    profiles:
      - release

  maintenance:
    build:
      context: .
      dockerfile: Dockerfile.engine
      target: engine-maintenance
    image: vasi-engine-maintenance:0.44.0
    command: ["scripts/backup.mjs"]
    user: "1000:1000"
    volumes:
      - ./data:/app/data:ro
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    profiles:
      - tools

  capacity:
    build:
      context: .
      dockerfile: Dockerfile.engine
      target: engine-maintenance
    image: vasi-engine-maintenance:0.44.0
    entrypoint: ["node", "scripts/probe-capacity-readiness.mjs"]
    user: "1000:1000"
    volumes:
      - ./data:/app/data:ro
      - type: bind
        source: /proc/stat
        target: /host/proc/stat
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: /proc/loadavg
        target: /host/proc/loadavg
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: /proc/meminfo
        target: /host/proc/meminfo
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: /proc/pressure
        target: /host/proc/pressure
        read_only: true
        bind:
          create_host_path: false
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    profiles:
      - tools

  app:
    build:
      context: .
      target: runner
    image: vasi:0.44.0
    restart: unless-stopped
    init: true
    ports:
      - 127.0.0.1:3000:3000
    volumes:
      - ./data:/app/data:ro
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
      - /app/.next/cache:size=64m,mode=0750,uid=1000,gid=1000
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 30s
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
