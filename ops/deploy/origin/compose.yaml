name: vasi-origin

services:
  migrate:
    image: ${VASI_IMAGE:?Set VASI_IMAGE to an immutable VASI image reference}
    restart: "no"
    environment: &vasi-environment
      NODE_ENV: production
      VASI_CONFIG_PROFILE: production
      VASI_MIGRATE_ONLY: "true"
      PORT: "3000"
      VASI_RUN_MIGRATIONS: "false"
      NEXT_PUBLIC_WEBAPP_URL: ${NEXT_PUBLIC_WEBAPP_URL:?Set the canonical public edge URL}
      NEXT_PRIVATE_INTERNAL_WEBAPP_URL: ${NEXT_PRIVATE_INTERNAL_WEBAPP_URL:?Set the private origin URL}
      NEXT_PUBLIC_SUPPORT_EMAIL: ${NEXT_PUBLIC_SUPPORT_EMAIL:?Set the support email}
      NEXT_PUBLIC_SIGNING_CONTACT_INFO: ${NEXT_PUBLIC_SIGNING_CONTACT_INFO:?Set signing contact information}
      NEXTAUTH_SECRET_FILE: /run/secrets/vasi-session-secret
      NEXT_PRIVATE_ENCRYPTION_KEY_FILE: /run/secrets/vasi-encryption-primary
      NEXT_PRIVATE_ENCRYPTION_SECONDARY_KEY_FILE: /run/secrets/vasi-encryption-secondary
      NEXT_PRIVATE_DATABASE_URL_FILE: /run/secrets/vasi-database-url
      NEXT_PRIVATE_DIRECT_DATABASE_URL_FILE: /run/secrets/vasi-database-url
      NEXT_PUBLIC_UPLOAD_TRANSPORT: database
      NEXT_PUBLIC_DOCUMENT_SIZE_UPLOAD_LIMIT: ${NEXT_PUBLIC_DOCUMENT_SIZE_UPLOAD_LIMIT:-10}
      NEXT_PRIVATE_JOBS_PROVIDER: local
      NEXT_PRIVATE_SMTP_TRANSPORT: smtp-auth
      NEXT_PRIVATE_SMTP_HOST: ${NEXT_PRIVATE_SMTP_HOST:?Set the SMTP host}
      NEXT_PRIVATE_SMTP_PORT: ${NEXT_PRIVATE_SMTP_PORT:-465}
      NEXT_PRIVATE_SMTP_USERNAME_FILE: /run/secrets/vasi-smtp-username
      NEXT_PRIVATE_SMTP_PASSWORD_FILE: /run/secrets/vasi-smtp-password
      NEXT_PRIVATE_SMTP_SECURE: ${NEXT_PRIVATE_SMTP_SECURE:-true}
      NEXT_PRIVATE_SMTP_UNSAFE_IGNORE_TLS: "false"
      NEXT_PRIVATE_SMTP_FROM_NAME: ${NEXT_PRIVATE_SMTP_FROM_NAME:-VASI}
      NEXT_PRIVATE_SMTP_FROM_ADDRESS: ${NEXT_PRIVATE_SMTP_FROM_ADDRESS:?Set the approved sender address}
      NEXT_PRIVATE_SIGNING_TRANSPORT: local
      NEXT_PRIVATE_SIGNING_LOCAL_FILE_PATH: /run/secrets/vasi-signing.p12
      NEXT_PRIVATE_SIGNING_PASSPHRASE_FILE: /run/secrets/vasi-signing-passphrase
      NEXT_PRIVATE_SIGNING_TIMESTAMP_AUTHORITY: ${NEXT_PRIVATE_SIGNING_TIMESTAMP_AUTHORITY:-}
      NEXT_PRIVATE_USE_LEGACY_SIGNING_SUBFILTER: "false"
      NEXT_PUBLIC_DISABLE_SIGNUP: "true"
      NEXT_PUBLIC_DISABLE_EMAIL_PASSWORD_SIGNUP: "true"
      NEXT_PUBLIC_DISABLE_GOOGLE_SIGNUP: "true"
      NEXT_PUBLIC_DISABLE_MICROSOFT_SIGNUP: "true"
      NEXT_PUBLIC_DISABLE_OIDC_SIGNUP: "true"
      NEXT_PUBLIC_FEATURE_BILLING_ENABLED: "false"
      NEXT_PUBLIC_POSTHOG_KEY: ""
      NEXT_PRIVATE_DOCUMENSO_LICENSE_KEY: ""
      DOCUMENSO_DISABLE_TELEMETRY: "true"
      NEXT_PRIVATE_DOCUMENT_CONVERSION_URL: ""
      NEXT_PRIVATE_BROWSERLESS_URL: ""
      NEXT_PRIVATE_WEBHOOK_SSRF_BYPASS_HOSTS: ""
      NEXT_PRIVATE_PLAIN_API_KEY: ""
      GOOGLE_VERTEX_PROJECT_ID: ""
      GOOGLE_VERTEX_API_KEY: ""
      DANGEROUS_BYPASS_RATE_LIMITS: "false"
    secrets: &vasi-secrets
      - vasi-session-secret
      - vasi-encryption-primary
      - vasi-encryption-secondary
      - vasi-database-url
      - vasi-smtp-username
      - vasi-smtp-password
      - source: vasi-signing-p12
        target: vasi-signing.p12
      - vasi-signing-passphrase
    networks:
      - egress
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=256m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    profiles:
      - tools

  app:
    image: ${VASI_IMAGE:?Set VASI_IMAGE to an immutable VASI image reference}
    restart: unless-stopped
    environment:
      <<: *vasi-environment
      VASI_MIGRATE_ONLY: "false"
    secrets: *vasi-secrets
    networks:
      - app
      - egress
    expose:
      - "3000"
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=256m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health | grep -q '\"status\"'"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s
    stop_grace_period: 30s

  bootstrap-admin:
    image: ${VASI_IMAGE:?Set VASI_IMAGE to an immutable VASI image reference}
    restart: "no"
    environment:
      NODE_ENV: production
      VASI_BOOTSTRAP_ADMIN: "true"
      VASI_RUN_MIGRATIONS: "false"
      NEXT_PRIVATE_DATABASE_URL_FILE: /run/secrets/vasi-database-url
      NEXT_PRIVATE_DIRECT_DATABASE_URL_FILE: /run/secrets/vasi-database-url
      VASI_BOOTSTRAP_ADMIN_EMAIL: ${VASI_BOOTSTRAP_ADMIN_EMAIL:?Set the initial administrator email}
      VASI_BOOTSTRAP_ADMIN_NAME: ${VASI_BOOTSTRAP_ADMIN_NAME:?Set the initial administrator display name}
      VASI_BOOTSTRAP_ADMIN_PASSWORD_FILE: /run/secrets/vasi-bootstrap-admin-password
    secrets:
      - vasi-database-url
      - vasi-bootstrap-admin-password
    networks:
      - egress
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=64m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    profiles:
      - tools

  origin:
    image: nginx:1.29.8-alpine3.23
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      NGINX_ENVSUBST_FILTER: ^VASI_
      VASI_SERVER_NAME: ${VASI_SERVER_NAME:?Set the private TLS server name}
      VASI_TRUSTED_PROXY_CIDR: ${VASI_TRUSTED_PROXY_CIDR:?Set the approved edge source CIDR}
      VASI_CLIENT_MAX_BODY_SIZE: ${VASI_CLIENT_MAX_BODY_SIZE:-12m}
    ports:
      - "${VASI_ORIGIN_BIND_ADDRESS:?Set the private bind address}:${VASI_ORIGIN_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ${VASI_TLS_CERT_FILE:?Set the internal TLS certificate path}:/etc/nginx/tls/tls.crt:ro
      - ${VASI_TLS_KEY_FILE:?Set the internal TLS key path}:/etc/nginx/tls/tls.key:ro
    networks:
      - app
    read_only: true
    tmpfs:
      - /etc/nginx/conf.d:mode=0755,size=1m
      - /var/cache/nginx:mode=0755,size=32m
      - /var/run:mode=0755,size=8m
      - /tmp:mode=1777,size=8m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - NET_BIND_SERVICE
      - SETGID
      - SETUID
    healthcheck:
      test: ["CMD-SHELL", "wget --no-check-certificate -qO- https://127.0.0.1/healthz | grep -q '\"status\"'"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  app:
    internal: true
  egress: {}

secrets:
  vasi-session-secret:
    file: ${VASI_SECRETS_DIR:?Set the protected secret directory}/session-secret
  vasi-encryption-primary:
    file: ${VASI_SECRETS_DIR:?Set the protected secret directory}/encryption-primary
  vasi-encryption-secondary:
    file: ${VASI_SECRETS_DIR:?Set the protected secret directory}/encryption-secondary
  vasi-database-url:
    file: ${VASI_SECRETS_DIR:?Set the protected secret directory}/database-url
  vasi-smtp-username:
    file: ${VASI_SECRETS_DIR:?Set the protected secret directory}/smtp-username
  vasi-smtp-password:
    file: ${VASI_SECRETS_DIR:?Set the protected secret directory}/smtp-password
  vasi-signing-p12:
    file: ${VASI_SECRETS_DIR:?Set the protected secret directory}/signing.p12
  vasi-signing-passphrase:
    file: ${VASI_SECRETS_DIR:?Set the protected secret directory}/signing-passphrase
  vasi-bootstrap-admin-password:
    file: ${VASI_SECRETS_DIR:?Set the protected secret directory}/bootstrap-admin-password
