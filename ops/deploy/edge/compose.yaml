name: vasi-edge

services:
  gateway:
    image: ${VASI_EDGE_IMAGE:?Set VASI_EDGE_IMAGE to a unique VASI commit tag}
    build:
      context: ./gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      oauth2-proxy:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: "8080"
      VASI_PUBLIC_ORIGIN: ${VASI_PUBLIC_ORIGIN:?Set the canonical public HTTPS origin}
      VASI_ORIGIN_URL: ${VASI_ORIGIN_URL:?Set the verified private HTTPS origin}
      VASI_ORIGIN_CA_FILE: /run/tls/origin-ca.pem
      VASI_TRUSTED_PROXY_CIDRS: ${VASI_TRUSTED_PROXY_CIDRS:?Set the outer ingress source CIDR}
      VASI_FORBIDDEN_COOKIE_DOMAINS: ${VASI_FORBIDDEN_COOKIE_DOMAINS:?Set internal and fallback cookie domains}
      VASI_PDF_UPLOAD_LIMIT_MIB: ${VASI_PDF_UPLOAD_LIMIT_MIB:-10}
      VASI_OAUTH2_PROXY_URL: http://oauth2-proxy:4180
    ports:
      - "${VASI_EDGE_BIND_ADDRESS:?Set the private edge bind address}:${VASI_EDGE_PORT:-8080}:8080"
    volumes:
      - ${VASI_ORIGIN_CA_FILE:?Set the private-origin CA certificate path}:/run/tls/origin-ca.pem:ro
    networks:
      auth:
        ipv4_address: ${VASI_GATEWAY_AUTH_IP:-172.30.20.2}
      egress: {}
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=16m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/readyz | grep -q '\"status\":\"ready\"'"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    stop_grace_period: 30s

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.15.2@sha256:aa0bd8dd5ab0c78e4c91c92755ad573a5f92241f88138b4141b8ec803463b4fd
    restart: unless-stopped
    command:
      - --provider=oidc
      - --oidc-issuer-url=${VASI_OIDC_ISSUER_URL:?Set the approved OIDC issuer URL}
      - --client-id=${VASI_OIDC_CLIENT_ID:?Set the registered OIDC client ID}
      - --client-secret-file=/run/secrets/vasi-oidc-client-secret
      - --cookie-secret-file=/run/secrets/vasi-oauth-cookie-secret
      - --redirect-url=${VASI_PUBLIC_ORIGIN:?Set the canonical public HTTPS origin}/oauth2/callback
      - --whitelist-domain=${VASI_PUBLIC_HOST:?Set the canonical public host}
      - --email-domain=${VASI_OIDC_EMAIL_DOMAIN:?Set the approved staff email domain}
      - --oidc-email-claim=${VASI_OIDC_EMAIL_CLAIM:-email}
      - --scope=openid email profile
      - --skip-claims-from-profile-url=true
      - --code-challenge-method=S256
      - --insecure-oidc-skip-nonce=false
      - --http-address=0.0.0.0:4180
      - --upstream=static://202
      - --proxy-prefix=/oauth2
      - --reverse-proxy=true
      - --trusted-proxy-ip=${VASI_GATEWAY_AUTH_IP:-172.30.20.2}/32
      - --real-client-ip-header=X-Real-IP
      - --cookie-name=__Host-vasi_staff
      - --cookie-path=/
      - --cookie-secure=true
      - --cookie-httponly=true
      - --cookie-samesite=lax
      - --cookie-expire=8h
      - --cookie-refresh=0
      - --cookie-csrf-per-request=true
      - --cookie-csrf-per-request-limit=8
      - --session-cookie-minimal=true
      - --pass-access-token=false
      - --pass-authorization-header=false
      - --pass-basic-auth=false
      - --pass-user-headers=false
      - --set-authorization-header=false
      - --set-basic-auth=false
      - --set-xauthrequest=true
      - --skip-provider-button=true
      - --request-logging=false
      - --auth-logging=false
      - --silence-ping-logging=true
    secrets:
      - vasi-oidc-client-secret
      - vasi-oauth-cookie-secret
    networks:
      auth:
        ipv4_address: ${VASI_OAUTH_AUTH_IP:-172.30.20.3}
      egress: {}
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=16m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "/bin/oauth2-proxy", "--version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    stop_grace_period: 15s

networks:
  auth:
    internal: true
    ipam:
      config:
        - subnet: ${VASI_AUTH_SUBNET:-172.30.20.0/24}
  egress: {}

secrets:
  vasi-oidc-client-secret:
    file: ${VASI_EDGE_SECRETS_DIR:?Set the protected edge secret directory}/oidc-client-secret
  vasi-oauth-cookie-secret:
    file: ${VASI_EDGE_SECRETS_DIR:?Set the protected edge secret directory}/oauth-cookie-secret
