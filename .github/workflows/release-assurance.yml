name: Release assurance

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: release-assurance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  assurance:
    name: Source, build, SBOM, and images
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out exact source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          cache: npm
          node-version: 24

      - name: Install locked dependencies
        run: npm ci

      - name: Verify source and key lifecycle
        run: |
          npm run check
          npm run build
          npm run assurance:keys

      - name: Record release version
        id: release
        run: |
          node -p '"version=" + require("./package.json").version' >> "$GITHUB_OUTPUT"

      - name: Create source assurance evidence
        run: npm run assurance:source -- "/tmp/vasi-source-${GITHUB_SHA}"

      - name: Build exact production images
        run: |
          docker build --target runner --tag "vasi:${{ steps.release.outputs.version }}" .
          docker build --target migrator --tag "vasi-settings:${{ steps.release.outputs.version }}" .
          docker build --file Dockerfile.engine --target engine-runtime --tag "vasi-engine:${{ steps.release.outputs.version }}" .
          docker build --file Dockerfile.engine --target engine-tools --tag "vasi-engine-tools:${{ steps.release.outputs.version }}" .
          docker build --file Dockerfile.engine --target engine-maintenance --tag "vasi-engine-maintenance:${{ steps.release.outputs.version }}" .

      - name: Create exact image SBOM and vulnerability evidence
        run: >-
          npm run assurance:images -- "/tmp/vasi-images-${GITHUB_SHA}"
          "vasi:${{ steps.release.outputs.version }}"
          "vasi-settings:${{ steps.release.outputs.version }}"
          "vasi-engine:${{ steps.release.outputs.version }}"
          "vasi-engine-tools:${{ steps.release.outputs.version }}"
          "vasi-engine-maintenance:${{ steps.release.outputs.version }}"

      - name: Retain assurance evidence
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: vasi-assurance-${{ github.sha }}
          path: |
            /tmp/vasi-source-${{ github.sha }}
            /tmp/vasi-images-${{ github.sha }}
          if-no-files-found: error
          retention-days: 30
