name: CodeQL

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: "23 4 * * 1"

permissions:
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: JavaScript and TypeScript
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript
    steps:
      - name: Check out exact source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Analyze
        id: analyze
        uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          category: ".github/workflows/codeql-analysis.yml:analyze/language:${{ matrix.language }}"

      - name: Reject high and critical security results
        env:
          VASI_CODEQL_SARIF_DIR: ${{ steps.analyze.outputs.sarif-output }}
        run: node scripts/verify-codeql-sarif.mjs "$VASI_CODEQL_SARIF_DIR"
