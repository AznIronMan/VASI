services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: vasi
      POSTGRES_USER: vasi
      POSTGRES_PASSWORD: vasi
    ports:
      - "5432:5432"
    volumes:
      - vasi-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vasi -d vasi"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  vasi-postgres:
